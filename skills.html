<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevMatch — Setup Profile</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0b0f;
  --card:#12141a;
  --border:rgba(255,255,255,0.08);
  --green:#00ffa3;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body {
  margin:0;
  font-family:'Syne', sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* container */
.box {
  width:100%;
  max-width:600px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2.5rem;
  box-shadow:0 0 40px rgba(0,255,163,0.05);
}

/* logo */
.logo {
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-size:1.6rem;
  margin-bottom:5px;
}
.logo span { color:var(--green); }

.step {
  text-align:center;
  font-size:0.8rem;
  color:var(--muted);
  margin-bottom:25px;
}

/* title */
h2 {
  margin-bottom:8px;
}

p {
  color:var(--muted);
  font-size:0.9rem;
  margin-bottom:20px;
}

/* input */
.input-group {
  display:flex;
  gap:10px;
  margin-bottom:1rem;
}

.input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f1117;
  color:white;
  outline:none;
  transition:0.2s;
}

.input:focus {
  border-color:var(--green);
}

/* small button */
.btn-small {
  padding:12px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  transition:0.2s;
}

.btn-small:hover {
  border-color:var(--green);
}

/* detected skills */
.skills-box {
  margin-top:15px;
}

.skill {
  display:inline-block;
  background:rgba(0,255,163,0.1);
  color:var(--green);
  padding:5px 10px;
  border-radius:6px;
  margin:4px;
  font-size:0.75rem;
  font-family:'JetBrains Mono';
}

/* main button */
.btn {
  width:100%;
  margin-top:1.8rem;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--green);
  color:black;
  font-weight:700;
  cursor:pointer;
  font-size:1rem;
  transition:0.2s;
}

.btn:hover {
  opacity:0.9;
}
</style>
</head>

<body>

<div class="box">

  <div class="logo">Dev<span>Match</span></div>
  <div class="step">Step 1 of 3 — Connect</div>

  <h2>Connect your profiles</h2>
  <p>AI will analyze your GitHub & LinkedIn to auto-detect your skills</p>

  <!-- GitHub -->
  <div class="input-group">
    <input id="github" type="text" class="input" placeholder="your-github-username">
    <button class="btn-small" onclick="analyze()">Analyze</button>
  </div>

  <!-- LinkedIn -->
  <input id="linkedin" type="text" class="input" placeholder="linkedin.com/in/yourprofile">

  <!-- detected skills -->
  <div class="skills-box" id="skillsBox"></div>

  <button class="btn" onclick="continueNext()">Continue →</button>

</div>

<script>

let detectedSkills = [];

function analyze() {
  const github = document.getElementById("github").value;

  if (!github) {
    alert("Enter GitHub username");
    return;
  }

  // 🔥 FAKE AI SKILL DETECTION (we upgrade later)
  detectedSkills = ["React", "Node.js", "Python", "MongoDB"];

  const box = document.getElementById("skillsBox");
  box.innerHTML = "";

  detectedSkills.forEach(skill => {
    box.innerHTML += `<span class="skill">${skill}</span>`;
  });

  alert("Skills detected 🚀");
}

function continueNext() {
  const github = document.getElementById("github").value;
  const linkedin = document.getElementById("linkedin").value;

  // store data
  localStorage.setItem("github", github);
  localStorage.setItem("linkedin", linkedin);
  localStorage.setItem("skills", JSON.stringify(detectedSkills));

  // go to dashboard
  window.location.href = "interests.html";
}

</script>

</body>
</html>
