<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevMatch Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0b0f, #0f1c1c);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: rgba(15, 23, 30, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo { font-size: 28px; }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,255,163,0.15); }
        .card p { color: #888; margin-bottom: 6px; font-size: 0.9rem; }
        .card h2 { font-size: 2.6rem; color: var(--primary); font-weight: 600; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.15fr;
            gap: 24px;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 28px;
        }
        .section h3 { margin-bottom: 20px; font-family: 'Syne', sans-serif; color: white; }

        .tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: rgba(0,255,163,0.12);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn.primary {
            background: var(--primary);
            color: #000;
            border: none;
        }
        .btn.primary:hover { background: #00e695; box-shadow: 0 0 25px rgba(0,255,163,0.6); }
        .btn.secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .loading { opacity: 0.6; cursor: wait; }

        #chatModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .chat-box {
            width: 440px;
            height: 580px;
            background: #0f1117;
            border-radius: 20px;
            border: 1px solid rgba(0,255,163,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header { padding: 18px 20px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; gap: 12px; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; }
        .user { align-self: flex-end; background: var(--primary); color: #000; }
        .ai { align-self: flex-start; background: #1a1d24; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📊</div>
        <h1 style="margin:0; font-size:1.6rem;">DevMatch Dashboard</h1>
    </div>

    <div class="container">
        <div class="stats">
            <div class="card"><p>Skills</p><h2 id="skillCount">0</h2></div>
            <div class="card"><p>Interests</p><h2 id="interestCount">0</h2></div>
            <div class="card"><p>Goal</p><h2 id="goalText">Win</h2></div>
            <div class="card"><p>Availability</p><h2 id="availabilityText">Partial</h2></div>
        </div>

        <div class="main-grid">
            <div class="section">
                <h3>Your Skills</h3>
                <div id="skills" class="tags"></div>

                <h3 style="margin-top: 32px;">Your Interests</h3>
                <div id="interests" class="tags"></div>

                <div style="margin-top: 32px; display:flex; gap:12px; flex-wrap:wrap;">
                    <button id="aiBtn" class="btn primary" onclick="openChat()">
                        🤖 Analyze with AI
                    </button>
                    <button class="btn secondary" onclick="goToCity()">
                        🌍 Explore Hackathons
                    </button>
                </div>
            </div>

            <div class="section">
                <h3>Activity Graph</h3>
                <div style="height: 340px;">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal">
        <div class="chat-box">
            <div class="chat-header">
                <strong>🤖 DevMatch AI</strong>
                <span onclick="closeChat()" style="cursor:pointer;">✕</span>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div style="padding:16px; border-top:1px solid rgba(255,255,255,0.1); display:flex; gap:10px;">
                <input id="chatInput" placeholder="Ask about your profile..." style="flex:1; padding:12px 16px; background:#1a1d24; border:1px solid #333; border-radius:12px; color:white;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="btn primary">Send</button>
            </div>
        </div>
    </div>

    <script>
        const skills = JSON.parse(localStorage.getItem("skills")) || [];
        const interests = JSON.parse(localStorage.getItem("interests")) || [];
        const goal = localStorage.getItem("goal") || "Win";
        const availability = localStorage.getItem("availability") || "Partial";

        document.getElementById("skillCount").innerText = skills.length;
        document.getElementById("interestCount").innerText = interests.length;
        document.getElementById("goalText").innerText = goal;
        document.getElementById("availabilityText").innerText = availability;

        // Render tags
        skills.forEach(s => document.getElementById("skills").innerHTML += `<span class="tag">${s}</span>`);
        interests.forEach(i => document.getElementById("interests").innerHTML += `<span class="tag">${i}</span>`);

        // Chart
        new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                datasets: [{ 
                    label: 'Productivity',
                    data: [3,5,4,6,7,5,8],
                    borderColor: '#00ffa3',
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 2, max: 9 } } }
        });

        function goToCity() { window.location.href = "city.html"; }

        let isLoading = false;
        function openChat() {
            if (isLoading) return;
            document.getElementById("chatModal").style.display = "flex";
            document.getElementById("chatMessages").innerHTML = "";
            sendMessage("Analyze my profile");   // auto-analyze
        }

        function closeChat() {
            document.getElementById("chatModal").style.display = "none";
        }

        function addMessage(type, text) {
            const div = document.createElement("div");
            div.className = `bubble ${type}`;
            div.innerText = text;
            document.getElementById("chatMessages").appendChild(div);
            div.scrollIntoView({behavior:"smooth"});
        }

        async function sendMessage(customMsg = null) {
            const input = document.getElementById("chatInput");
            const msg = customMsg || input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            const aiBtn = document.getElementById("aiBtn");
            if (aiBtn) aiBtn.classList.add("loading");

            addMessage("user", msg);
            if (!customMsg) input.value = "";

            const prompt = `Skills: ${skills.join(", ")}\nInterests: ${interests.join(", ")}\nGoal: ${goal}\nAvailability: ${availability}\n\nUser: ${msg}\nGive useful suggestions.`;

            try {
                const res = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ model: "phi3", prompt: prompt, stream: false })
                });

                if (!res.ok) throw new Error("Ollama API error");

                const data = await res.json();
                addMessage("ai", data.response || "No response from AI.");
            } catch (err) {
                addMessage("ai", "❌ Could not connect to Ollama.\n\nMake sure you ran:\n1. ollama serve\n2. ollama pull phi3\n\nThen try again.");
            } finally {
                isLoading = false;
                if (aiBtn) aiBtn.classList.remove("loading");
            }
        }
    </script>
</body>
</html>
